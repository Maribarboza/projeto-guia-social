 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidades BH | Pesquisa Inteligente</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .search-box { 
            max-width: 600px; margin: 20px auto 40px; padding: 15px; 
            border-radius: 50px; border: 2px solid #0044cc; width: 100%; font-size: 1.1rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: block; }
        .hidden { display: none; }
        .btn-mapa { background: #28a745; color: white; padding: 10px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html">← Voltar</a>
        <h1 style="margin-top: 20px;">Pesquisar Unidade</h1>
        <input type="text" id="filterInput" class="search-box" placeholder="Digite sua regional (ex: Barreiro, Norte...)">

        <div id="unitsList">
            <div class="card" data-name="barreiro"><h2>Barreiro</h2><p>Rua Pinheiro Chagas, 237</p><a href="https://www.google.com/maps/search/?api=1&query=CRAS+Barreiro+BH" class="btn-mapa">Ver no Mapa</a></div>
            <div class="card" data-name="centro-sul"><h2>Centro-Sul</h2><p>Rua Tupis, 149</p><a href="https://www.google.com/maps/search/?api=1&query=CRAS+Centro-Sul+BH" class="btn-mapa">Ver no Mapa</a></div>
            <div class="card" data-name="leste"><h2>Leste</h2><p>Rua Salinas, 1447</p><a href="https://www.google.com/maps/search/?api=1&query=CRAS+Leste+BH" class="btn-mapa">Ver no Mapa</a></div>
            <!-- Adicione as outras aqui com o mesmo padrão data-name -->
        </div>
    </div>

    <script>
        // JAVASCRIPT DE FILTRO EM TEMPO REAL
        document.getElementById('filterInput').addEventListener('keyup', function() {
            let value = this.value.toLowerCase();
            let cards = document.querySelectorAll('.card');
            
            cards.forEach(card => {
                let name = card.getAttribute('data-name');
                if(name.includes(value)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
